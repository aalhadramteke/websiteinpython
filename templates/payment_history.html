<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment History - Movie Booking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        :root {
            --text-color: #333;
            --bg-color: #f5f5f5;
            --table-bg: white;
            --table-text: #333;
            --navbar-gradient: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --th-bg: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            --tr-hover: #f9f9f9;
        }
        
        body.dark-mode {
            --text-color: #e0e0e0;
            --bg-color: #1a1a1a;
            --table-bg: #2d2d2d;
            --table-text: #e0e0e0;
            --navbar-gradient: linear-gradient(135deg, #2d2d2d 0%, #3d3d3d 100%);
            --th-bg: linear-gradient(135deg, #404040 0%, #505050 100%);
            --tr-hover: #3a3a3a;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: var(--bg-color);
            color: var(--text-color);
            transition: background 0.3s ease, color 0.3s ease;
        }
        
        .navbar {
            background: var(--navbar-gradient);
            padding: 15px 30px;
            color: white;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .navbar h1 {
            margin: 0;
            font-size: 24px;
        }
        
        .navbar a {
            color: white;
            text-decoration: none;
            padding: 8px 15px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 5px;
            transition: background 0.3s;
        }
        
        .navbar a:hover {
            background: rgba(255, 255, 255, 0.3);
        }
        
        .container {
            max-width: 1000px;
            margin: 40px auto;
            padding: 20px;
        }
        
        h2 {
            color: var(--text-color);
            margin-bottom: 30px;
            font-size: 28px;
        }
        
        .error {
            background: #fee;
            color: #c33;
            padding: 15px;
            border-radius: 5px;
            border-left: 4px solid #c33;
            margin-bottom: 20px;
        }
        
        .loading {
            text-align: center;
            padding: 40px;
            font-size: 18px;
            color: var(--text-color);
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--table-bg);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            border-radius: 5px;
            overflow: hidden;
            font-size: 14px;
        }
        
        th {
            background: var(--th-bg);
            color: white;
            padding: 15px 10px;
            text-align: left;
            font-weight: bold;
            border-right: 1px solid rgba(255, 255, 255, 0.2);
        }
        
        th:last-child {
            border-right: none;
        }
        
        td {
            padding: 15px 10px;
            border-bottom: 1px solid rgba(0, 0, 0, 0.1);
            word-break: break-word;
            color: var(--table-text);
        }
        
        body.dark-mode td {
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }
        
        tr:hover {
            background: var(--tr-hover);
        }
        
        tr:last-child td {
            border-bottom: none;
        }
        
        .status {
            padding: 6px 12px;
            border-radius: 20px;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            font-size: 12px;
            white-space: nowrap;
        }
        
        .status.completed {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }
        
        .status.pending {
            background: #fff3cd;
            color: #856404;
            border: 1px solid #ffeaa7;
        }
        
        .status.failed {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }
        
        .status.cancelled {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-color);
        }
        
        .empty-state h3 {
            color: rgba(0,0,0,0.6);
            margin-bottom: 10px;
        }
        
        body.dark-mode .empty-state h3 {
            color: rgba(255,255,255,0.5);
        }
        
        .empty-state a {
            display: inline-block;
            margin-top: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 12px 30px;
            text-decoration: none;
            border-radius: 5px;
            transition: transform 0.2s;
        }
        
        .empty-state a:hover {
            transform: translateY(-2px);
        }
        
        .dark-mode-toggle {
            position: fixed;
            top: 20px;
            right: 20px;
            z-index: 999;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            cursor: pointer;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
        }
        
        .dark-mode-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.4);
        }
        
        .button-group {
            display: flex;
            gap: 10px;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        
        .button-group button {
            padding: 10px 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }
        
        .button-group button:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .button-group button.danger {
            background: linear-gradient(135deg, #e74c3c 0%, #c0392b 100%);
        }
        
        .button-group button.danger:hover {
            box-shadow: 0 4px 15px rgba(231, 76, 60, 0.4);
        }
    </style>
</head>
<body>
    <button class="dark-mode-toggle" id="darkModeToggle">🌙</button>
    <div class="navbar">
        <h1>🎬 Payment History</h1>
        <a href="/">← Back to Home</a>
    </div>
    
    <div class="container">
        <div class="button-group">
            <h2>Your Bookings</h2>
            <div>
                <button id="exportBtn">Export to Excel</button>
                <button id="clearAllBtn" class="danger">Clear All</button>
            </div>
        </div>
        
        <div id="errorMessage" class="error" style="display: none;"></div>
        <div id="loadingMessage" class="loading">Loading your payment history...</div>
        <div id="paymentContent" style="display: none;">
            <table id="paymentsTable">
                <thead>
                    <tr>
                        <th style="width: 20%;">Movie</th>
                        <th style="width: 12%;">Seat #</th>
                        <th style="width: 12%;">Amount</th>
                        <th style="width: 15%;">Customer Name</th>
                        <th style="width: 15%;">Phone</th>
                        <th style="width: 12%;">Status</th>
                        <th style="width: 14%;">Booked On</th>
                        <th style="width: 10%;">Action</th>
                    </tr>
                </thead>
                <tbody id="paymentsList">
                </tbody>
            </table>
        </div>
        
        <div id="emptyState" class="empty-state" style="display: none;">
            <h3>No bookings found</h3>
            <p>You haven't booked any movie tickets yet.</p>
            <a href="/">Start booking now</a>
        </div>
    </div>
    
    <script>
        async function loadPaymentHistory() {
            try {
                const response = await fetch('/payment-history/json/');
                
                if (!response.ok) {
                    if (response.status === 401) {
                        document.getElementById('errorMessage').textContent = 'Please login to view your payment history.';
                        document.getElementById('errorMessage').style.display = 'block';
                        document.getElementById('loadingMessage').style.display = 'none';
                        setTimeout(() => {
                            window.location.href = '/login/';
                        }, 2000);
                        return;
                    }
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                
                if (data.error) {
                    if (data.error.includes('Not authenticated')) {
                        window.location.href = '/login/';
                        return;
                    }
                    document.getElementById('errorMessage').textContent = 'Error: ' + data.error;
                    document.getElementById('errorMessage').style.display = 'block';
                    document.getElementById('loadingMessage').style.display = 'none';
                } else if (data.payments && data.payments.length > 0) {
                    // Display payments
                    const paymentsList = document.getElementById('paymentsList');
                    paymentsList.innerHTML = '';
                    
                    data.payments.forEach(payment => {
                        const row = document.createElement('tr');
                        const statusBadge = `<span class="status ${payment.status}">${payment.status.charAt(0).toUpperCase() + payment.status.slice(1)}</span>`;
                        const bookingDate = new Date(payment.created_at).toLocaleDateString() + '<br>' + new Date(payment.created_at).toLocaleTimeString();
                        // Convert paise to rupees (divide by 100) or use default 250 if not available
                        const amountInRupees = payment.amount ? (parseInt(payment.amount) / 100) : 250;
                        
                        row.innerHTML = `
                            <td><strong>${payment.movie}</strong></td>
                            <td>#${payment.seats}</td>
                            <td>₹${amountInRupees}</td>
                            <td>${payment.first_name} ${payment.last_name}</td>
                            <td>${payment.phone}</td>
                            <td>${statusBadge}</td>
                            <td>${bookingDate}</td>
                            <td><button class="cancel-btn" data-id="${payment.id}" style="padding:6px 12px;background:#e74c3c;color:#fff;border:none;border-radius:4px;cursor:pointer;">Cancel</button></td>
                        `;
                        paymentsList.appendChild(row);
                    });
                    
                    document.getElementById('paymentContent').style.display = 'block';
                    document.getElementById('loadingMessage').style.display = 'none';
                } else {
                    document.getElementById('emptyState').style.display = 'block';
                    document.getElementById('loadingMessage').style.display = 'none';
                }
            } catch (error) {
                console.error('Payment history error:', error);
                document.getElementById('errorMessage').textContent = 'Error loading payment history: ' + error.message;
                document.getElementById('errorMessage').style.display = 'block';
                document.getElementById('loadingMessage').style.display = 'none';
            }
        }
        
        // Load payment history on page load
        loadPaymentHistory();

        // export functionality
        document.getElementById('exportBtn').addEventListener('click', ()=>{
            window.location.href='/payment-history/export/';
        });

        // delegate cancel click
        document.getElementById('paymentsList').addEventListener('click', async (e)=>{
            if (e.target.classList.contains('cancel-btn')){
                const pid = e.target.getAttribute('data-id');
                if (confirm('Are you sure you want to cancel this booking?')){
                    try{
                        const res = await fetch('/cancel-payment/',{
                            method:'POST',
                            headers:{'Content-Type':'application/json'},
                            body:JSON.stringify({payment_id: pid})
                        });
                        const data = await res.json();
                        if(data.success){
                            showCancellation(pid);
                        } else {
                            alert('Cancel failed: '+(data.error||'unknown'));
                        }
                    }catch(err){
                        alert('Error: '+err.message);
                    }
                }
            }
        });

        function showCancellation(pid){
            const btn = document.querySelector(`button.cancel-btn[data-id="${pid}"]`);
            if(btn){
                const row = btn.closest('tr');
                const statusCell = row.querySelector('.status');
                statusCell.textContent='Cancelled';
                statusCell.className='status cancelled';
                btn.remove();
            }
        }
        
        // Dark Mode Toggle
        const darkModeToggle = document.getElementById('darkModeToggle');
        const isDarkMode = localStorage.getItem('darkMode') === 'true';
        
        if (isDarkMode) {
            document.body.classList.add('dark-mode');
            darkModeToggle.textContent = '☀️';
        }
        
        darkModeToggle.addEventListener('click', () => {
            document.body.classList.toggle('dark-mode');
            const isNowDarkMode = document.body.classList.contains('dark-mode');
            localStorage.setItem('darkMode', isNowDarkMode);
            darkModeToggle.textContent = isNowDarkMode ? '☀️' : '🌙';
        });
        
        // Clear All Functionality
        document.getElementById('clearAllBtn').addEventListener('click', async () => {
            if (confirm('⚠️ Are you sure you want to clear all payment entries? This action cannot be undone!')) {
                try {
                    const res = await fetch('/clear-all-payments/', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({})
                    });
                    const data = await res.json();
                    if (data.success) {
                        alert('All payment entries have been cleared!');
                        loadPaymentHistory();
                    } else {
                        alert('Error clearing payments: ' + (data.error || 'unknown'));
                    }
                } catch (err) {
                    alert('Error: ' + err.message);
                }
            }
        });
    </script>
</body>
</html>
